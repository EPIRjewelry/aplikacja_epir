  - package-ecosystem: "npm"
    directory: "/workers/bigquery-batch"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      worker-bigquery-batch:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/workers/chat"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
