    open-pull-requests-limit: 2
    groups:
      ext-my-web-pixel:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/config"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      package-config:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
