name: Apply Branch Protection

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Tryb suchy (dry run) — wypisz payload bez zastosowania zmian"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  apply-protection:
    name: Apply branch protection rules to main
    runs-on: ubuntu-latest
    # Workflow wymaga sekretu GH_TOKEN z uprawnieniami administracyjnymi do repo.
    # Dodaj go ręcznie w: Settings > Secrets and variables > Actions > New repository secret
    # Nazwa sekretu: GH_TOKEN
    # Rekomendacja: fine-grained token z uprawnieniem "Administration: Read and write"
    # dla repozytorium. Alternatywnie: classic PAT z zakresem `repo`.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show protection payload (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN — poniższy payload zostałby wysłany do GitHub API ==="
          cat <<'EOF'
          PUT /repos/${{ github.repository }}/branches/main/protection
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["build", "lint", "typecheck"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": false
          }
          EOF
          echo "=== Ustaw dry_run=false, aby zastosować reguły ==="

      - name: Apply branch protection rules
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "ERROR: Sekret GH_TOKEN nie jest ustawiony."
            echo "Dodaj go w: Settings > Secrets and variables > Actions > New repository secret"
            echo "Wymagane uprawnienia: repo (pełne) lub fine-grained: administration:write"
            exit 1
          fi

          echo "Stosowanie reguł ochrony gałęzi main..."

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/branches/main/protection \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["build", "lint", "typecheck"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": false
          }
          EOF

          echo "Reguły ochrony gałęzi zostały pomyślnie zastosowane."

      - name: Verify protection rules
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Weryfikacja zastosowanych reguł..."
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/branches/main/protection \
            --jq '{
              required_status_checks: .required_status_checks.contexts,
              strict: .required_status_checks.strict,
              enforce_admins: .enforce_admins.enabled,
              required_approving_review_count: .required_pull_request_reviews.required_approving_review_count,
              dismiss_stale_reviews: .required_pull_request_reviews.dismiss_stale_reviews
            }'
