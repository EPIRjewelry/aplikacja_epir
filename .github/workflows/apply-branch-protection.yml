name: Apply Branch Protection

on:
  push:
    branches:
      - main
    paths:
      - '.github/branch-protection.md'
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# WAŻNE: Ten workflow wymaga sekretu GH_TOKEN z odpowiednimi uprawnieniami.
#
# Wymagane uprawnienia tokenu:
#   - repo (pełny dostęp do repozytorium) LUB
#   - administration:write (tylko uprawnienia administracyjne)
#
# Jak dodać sekret:
#   1. Przejdź do Settings → Secrets and variables → Actions w repozytorium.
#   2. Kliknij "New repository secret".
#   3. Nazwij sekret GH_TOKEN i wklej wartość tokenu.
#
# Token NIE jest dostarczany w tym PR. Musi zostać dodany ręcznie przez
# maintainera przed uruchomieniem workflowu.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  apply-branch-protection:
    name: Apply Branch Protection Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply branch protection rules for main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/EPIRjewelry/aplikacja_epir/branches/main/protection \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["build", "lint", "typecheck"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "required_linear_history": false,
            "required_conversation_resolution": false,
            "lock_branch": false,
            "allow_fork_syncing": false
          }
          EOF

      - name: Verify branch protection was applied
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Verifying branch protection rules on main..."
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/EPIRjewelry/aplikacja_epir/branches/main/protection \
            | jq '{
                enforce_admins: .enforce_admins.enabled,
                required_approving_review_count: .required_pull_request_reviews.required_approving_review_count,
                dismiss_stale_reviews: .required_pull_request_reviews.dismiss_stale_reviews,
                strict_status_checks: .required_status_checks.strict,
                required_contexts: .required_status_checks.contexts
              }'
