name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'package.json'

      - name: Setup Node
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run lint
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm run lint -- --config .eslintrc.cjs

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.relevant != 'true'
        run: echo "No app/package changes for ${{ matrix.app }} - skipping lint"

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'package.json'

      - name: Setup Node
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run typecheck
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm run typecheck

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.relevant != 'true'
        run: echo "No app/package changes for ${{ matrix.app }} - skipping typecheck"

  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'package.json'

      - name: Setup Node
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run build
        if: steps.changes.outputs.relevant == 'true'
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.relevant != 'true'
        run: echo "No app/package changes for ${{ matrix.app }} - skipping build"
