name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run lint
        working-directory: apps/${{ matrix.app }}
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run typecheck
        working-directory: apps/${{ matrix.app }}
        run: npm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [kazka, zareczyny]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run build
        working-directory: apps/${{ matrix.app }}
        run: npm run build
