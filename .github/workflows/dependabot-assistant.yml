name: Dependabot assistant

# Auto-komentarze przy PR Dependabota wyłączone (oszczędność minut). Przywróć trigger `pull_request` z pliku z historii Gita, jeśli znów potrzebny.
on:
  workflow_dispatch:

jobs:
  disabled-notice:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Asystent Dependabota jest wyłączony. PR-y Dependabota nadal działają przez dependabot.yml."
