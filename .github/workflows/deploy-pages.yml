name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Tylko lock aplikacji Hydrogen — pełny `npm ci` w rootcie instaluje wszystkie workery
          # i potrafi wywalić się na konflikcie esbuild (np. workers/analytics vs inne pakiety).
          cache-dependency-path: apps/zareczyny/package-lock.json

      - name: Install app dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
        working-directory: apps/zareczyny

      - name: Build app
        run: npm run build
        working-directory: apps/zareczyny

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy public --project-name=zareczyny-hydrogen-pages --branch=main
        working-directory: apps/zareczyny
