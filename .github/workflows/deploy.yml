name: Deploy (Cloudflare)

# Push na main (workers) → deploy workerów. Pełny deploy (Pages + smoke): workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'apps/operator-studio/**'
      - '.github/workflows/deploy.yml'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      deploy_workers:
        description: "Deploy workers"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy Cloudflare Pages apps"
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-workers:
    name: deploy-workers
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.deploy_workers == true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install monorepo dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Walidacja polityki produkcyjnej Wrangler
        run: python3 scripts/ci/validate-wrangler-prod-policy.py

      - name: Walidacja kontraktu danych analitycznych (EDCG)
        run: python3 scripts/ci/validate-data-contract.py

      - name: Walidacja mapy przepływu danych (EDOG, statyczna)
        run: python3 scripts/ci/validate-data-flow-map.py

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Deploy analytics worker
        working-directory: workers/analytics
        run: npx wrangler deploy --env=""

      - name: Deploy bigquery-batch worker
        working-directory: workers/bigquery-batch
        run: npx wrangler deploy --env=""

      - name: Deploy store-steward worker
        working-directory: workers/store-steward
        run: npx wrangler deploy --env=""

      - name: Apply store-steward D1 migrations
        working-directory: workers/store-steward
        run: |
          npx wrangler d1 execute jewelry-analytics-db --remote --file=./migrations/001_store_signals.sql
          npx wrangler d1 execute jewelry-analytics-db --remote --file=./migrations/002_steward_insights.sql
          npx wrangler d1 execute jewelry-analytics-db --remote --file=./migrations/003_steward_reports.sql

      - name: Deploy analyst-worker worker
        working-directory: workers/analyst-worker
        run: npx wrangler deploy --env=""

      - name: Deploy marketing-ingest worker
        working-directory: workers/marketing-ingest
        run: npx wrangler deploy --env=""

      - name: Deploy chat worker
        working-directory: workers/chat
        run: npx wrangler deploy --env=""

      - name: Apply chat D1 migration (operator_daily_reports)
        working-directory: workers/chat
        run: npx wrangler d1 execute ai-assistant-sessions-db --remote --file=./migrations/013_operator_copilot.sql

      - name: Deploy rag worker
        working-directory: workers/rag-worker
        run: npx wrangler deploy --env=""

  post-deploy-smoke:
    name: post-deploy-smoke
    runs-on: ubuntu-latest
    needs:
      - deploy-workers
    if: needs.deploy-workers.result == 'success' && github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Post-deploy smoke gate
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_RAG_HEALTH_URL: ${{ secrets.SMOKE_RAG_HEALTH_URL }}
          SMOKE_EPIR_CHAT_SHARED_SECRET: ${{ secrets.SMOKE_EPIR_CHAT_SHARED_SECRET }}
        run: |
          node --check scripts/smoke/post-deploy-smoke.mjs
          node scripts/smoke/post-deploy-smoke.mjs

  deploy-pages:
    name: deploy-pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: kazka
            project: kazka-hydrogen-pages
          - app: zareczyny
            project: zareczyny-hydrogen-pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/${{ matrix.app }}/package-lock.json

      - name: Install app dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build app
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Deploy app to Cloudflare Pages
        working-directory: apps/${{ matrix.app }}
        run: |
          npx wrangler pages deploy public \
            --project-name=${{ matrix.project }} \
            --branch=main
