version: 2

sources:
  - name: epir_warehouse
    description: >-
      LEGACY BigQuery read path. Kanoniczny odczyt operacyjny run_analytics_query
      to Iceberg/R2 SQL — docs/EPIR_ANALYTICS_DATA_CONTRACT.md. Zdarzenia pixela
      trafiają do epir_pixel_events_raw po eksporcie z D1 (epir-bigquery-batch).
    database: "{{ var('gcp_project_id') }}"
    schema: "{{ var('epir_dataset') }}"
    tables:
      - name: epir_pixel_events_raw
        description: LEGACY BQ — nie źródło prawdy dla R2 SQL. Iceberg read model używa page_url (nie url/payload).
      - name: messages_raw
        description: Eksport wiadomości czata z D1 (ai-assistant-sessions-db).
