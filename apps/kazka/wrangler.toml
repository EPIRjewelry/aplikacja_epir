# Kazka – EPIR Art Jewellery & Gemstone (kazka.epirbizuteria.pl)
# Deploy: wrangler pages deploy public --project-name=kazka-hydrogen-pages

name = "kazka-hydrogen-pages"
# account_id – Pages nie obsługuje w wrangler.toml; ustaw CLOUDFLARE_ACCOUNT_ID lub wrangler login
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Dla wrangler pages deploy – katalog ze statyką
pages_build_output_dir = "public"

# Zmienne [vars] – ustaw w Cloudflare Dashboard (Settings > Environment variables)
# aby uniknąć konfliktów "Binding name already in use". Tu tylko vars specyficzne dla deploy.
[vars]
BRAND = "kazka"
COLLECTION_FILTER = "kazka"
NODE_ENV = "production"
# Frontend używa same-origin `/api/chat`; ewentualna wartość jest tylko legacy.
CHAT_API_URL = "/api/chat"
PUBLIC_STORE_DOMAIN = "epir-art-silver-jewellery.myshopify.com"

# Ustaw w Dashboard: PUBLIC_STORE_DOMAIN, PUBLIC_CHECKOUT_DOMAIN, PUBLIC_STOREFRONT_ID,
# SHOP_ID, PUBLIC_STOREFRONT_API_VERSION
# Secrets (Cloudflare Pages -> Settings -> Variables and Secrets -> Secrets):
# - SESSION_SECRET
# - PUBLIC_STOREFRONT_API_TOKEN
# - PRIVATE_STOREFRONT_API_TOKEN
# - PUBLIC_CUSTOMER_ACCOUNT_API_CLIENT_ID
# - EPIR_CHAT_SHARED_SECRET
