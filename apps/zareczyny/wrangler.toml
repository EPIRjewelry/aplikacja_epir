# Zareczyny – EPIR Art Jewellery & Gemstone (pierścionki zaręczynowe)
# Deploy: wrangler pages deploy public --project-name=zareczyny-hydrogen-pages
# Używa: wrangler pages deploy public --project-name=zareczyny-hydrogen-pages

name = "zareczyny-hydrogen-pages"
# account_id – Pages nie obsługuje w wrangler.toml; ustaw CLOUDFLARE_ACCOUNT_ID lub wrangler login
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Dla wrangler pages deploy – katalog ze statyką
pages_build_output_dir = "public"

[vars]
BRAND = "zareczyny"
COLLECTION_FILTER = "pierscionki-zareczynowe,zareczyny-zlote,zareczyny-srebrne"
COLLECTION_HUB_HANDLE = "pierscionki-zareczynowe"
COLLECTION_GOLD_HANDLE = "zareczyny-zlote"
COLLECTION_SILVER_HANDLE = "zareczyny-srebrne"
NODE_ENV = "production"
PUBLIC_STORE_DOMAIN = "epir-art-silver-jewellery.myshopify.com"
PUBLIC_CHECKOUT_DOMAIN = "checkout.shopify.com"
PUBLIC_STOREFRONT_ID = "1000013955"
SHOP_ID = "55145660472"

# PUBLIC_STOREFRONT_API_VERSION – Storefront API (np. 2025-10). Fallback w server.ts: 2025-10
PUBLIC_STOREFRONT_API_VERSION = "2025-10"

# Czat Hydrogen: POST /api/chat → S2S na worker. Ustaw sekret (Pages + .dev.vars):
# EPIR_CHAT_SHARED_SECRET — identyczny jak: cd workers/chat && wrangler secret put EPIR_CHAT_SHARED_SECRET

# Secrets (Cloudflare Pages -> Settings -> Variables and Secrets -> Secrets):
# - SESSION_SECRET
# - EPIR_CHAT_SHARED_SECRET
# - PUBLIC_STOREFRONT_API_TOKEN
# - PRIVATE_STOREFRONT_API_TOKEN
# - PUBLIC_CUSTOMER_ACCOUNT_API_CLIENT_ID
