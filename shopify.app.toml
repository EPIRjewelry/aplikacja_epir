# Konfiguracja aplikacji EPIR – jedna aplikacja Shopify łącząca extensions
# client_id: skopiuj z Shopify Partners (App setup → Client credentials)
# application_url: URL workera/backendu (np. chat worker)

name = "epir_ai"
client_id = "80a9878cfb29c901c987bf0046a36238"
application_url = "https://asystent.epirbizuteria.pl"
embedded = true

[build]
automatically_update_urls_on_dev = true
# Jawne ścieżki do extensions – CLI buduje tylko te katalogi
extension_directories = [
  "extensions/asystent-klienta",
  "extensions/my-web-pixel"
]

[webhooks]
api_version = "2026-01"

[access_scopes]
scopes = "customer_read_customers,customer_read_orders,customer_read_store_credit_account_transactions,customer_read_store_credit_accounts,unauthenticated_read_product_listings"

[auth]
redirect_urls = [
  "https://asystent.epirbizuteria.pl/api/auth"
]

# App Proxy – chat worker pod /apps/assistant/*
# Usuń sekcję [app_proxy], jeśli chat worker nie ma być pod /apps/assistant/*
[app_proxy]
url = "https://asystent.epirbizuteria.pl"
subpath = "assistant"
prefix = "apps"
