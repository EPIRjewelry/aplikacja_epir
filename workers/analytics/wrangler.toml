name = "epir-analityc-worker"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[build]
command = ""

[env.staging]
# Staging profile intentionally inherits top-level bindings/secrets.
# Keep environment-specific overrides here only when needed.

[env.production]
# Keep production aligned with deploy-policy gate (no workers.dev publish).
workers_dev = false
# Production profile intentionally inherits top-level bindings/secrets.

[vars]
# `null` = literal Origin string from Shopify Web Pixel sandbox (opaque origin)
ALLOWED_ORIGINS = "https://epirbizuteria.pl,https://zareczyny.epirbizuteria.pl,https://epir-art-silver-jewellery.myshopify.com,https://asystent.epirbizuteria.pl,null"
# CQRS: R2 SQL → D1 materialized charts (Iceberg warehouse bucket name from R2 Data Catalog; not D1 database id)
R2_SQL_ACCOUNT_ID = "73283c24dc79f92edef30dcdbc98f230"
R2_SQL_WAREHOUSE_BUCKET = "epir-analytics-iceberg-warehouse"
WAREHOUSE_SQL_NAMESPACE = "analytics"
WAREHOUSE_SQL_TABLE = "epir_pixel_events_raw"
WAREHOUSE_DISTINCT_COLUMN = "session_id"
# Webhook secret:
# wrangler secret put SHOPIFY_WEBHOOK_SECRET
# Chronione odczyty CQRS/charts/pixel są wyłączone przez publiczny HTTP — wyłącznie Workers RPC (`AnalyticsS2SRpc`)
# przez service bindings z czatu (`ctx.props`; żadnego statycznego klucza współdzielonego dla S2S w kodzie analytics).
# R2 SQL read token (Workers R2 SQL Read + Data Catalog + storage read per Cloudflare docs):
# wrangler secret put R2_SQL_API_TOKEN

[[d1_databases]]
binding = "DB"
database_name = "jewelry-analytics-db"
database_id = "6a4f7cbb-3c1c-42c7-9d79-4ef74d421f23"

# Durable Object binding for Session tracking
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"
script_name = "epir-art-jewellery-worker"

# AI_WORKER removed per Cloudflare architecture plan - analytics gracefully skips
# AI analysis when env.AI_WORKER is undefined (analyzeCustomerBehaviorWithAI returns false)

# Nightly CQRS materialization (after BigQuery batch cron at 02:00 UTC)
[triggers]
crons = ["30 3 * * *"]

[[kv_namespaces]]
binding = "CHART_EDGE_CACHE"
id = "c2ea110f6df74080bb7a026546f2acfa"
preview_id = "379e017a2e9543a1847bdb12b7bddf06"

[[workflows]]
name = "epir-warehouse-cqrs-materialize"
binding = "WAREHOUSE_CQRS_WF"
class_name = "WarehouseCqrsWorkflow"

[observability]
enabled = true
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
# Log filter: Only logs from THIS worker (epir-analityc-worker)
# Use filter in Cloudflare dashboard: ScriptName == "epir-analityc-worker"
