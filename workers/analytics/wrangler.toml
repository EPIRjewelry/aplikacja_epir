name = "epir-analityc-worker"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[build]
command = ""

[vars]
ALLOWED_ORIGINS = "https://epirbizuteria.pl,https://zareczyny.epirbizuteria.pl,https://epir-art-silver-jewellery.myshopify.com,https://asystent.epirbizuteria.pl"
SHOPIFY_WEBHOOK_SECRET = "dev-placeholder-override-with-wrangler-secret-put"

[[d1_databases]]
binding = "DB"
database_name = "jewelry-analytics-db"
database_id = "6a4f7cbb-3c1c-42c7-9d79-4ef74d421f23"

# Durable Object binding for Session tracking
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"
script_name = "epir-art-jewellery-worker"

# AI_WORKER removed per Cloudflare architecture plan - analytics gracefully skips
# AI analysis when env.AI_WORKER is undefined (analyzeCustomerBehaviorWithAI returns false)

[observability]
enabled = true
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
# Log filter: Only logs from THIS worker (epir-analityc-worker)
# Use filter in Cloudflare dashboard: ScriptName == "epir-analityc-worker"
