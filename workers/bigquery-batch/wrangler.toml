name = "epir-bigquery-batch"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[build]
command = ""

[env.staging]
# Staging profile intentionally inherits top-level bindings/triggers/secrets.
# Keep environment-specific overrides here only when needed.

[env.production]
# Production profile intentionally inherits top-level bindings/triggers/secrets.
# Keep environment-specific overrides here only when needed.

# Cron trigger: codziennie o 2:00 UTC
[triggers]
crons = ["0 2 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "jewelry-analytics-db"
database_id = "6a4f7cbb-3c1c-42c7-9d79-4ef74d421f23"

[[d1_databases]]
binding = "DB_CHATBOT"
database_name = "ai-assistant-sessions-db"
database_id = "475a1cb7-f1b5-47ba-94ed-40fd64c32451"

# Sekrety Pipelines (HTTP ingest D1 → Iceberg):
# wrangler secret put PIPELINE_PIXEL_INGEST_URL    # https://{stream-id}.ingest.cloudflare.com
# wrangler secret put PIPELINE_MESSAGES_INGEST_URL
# wrangler secret put PIPELINE_INGEST_TOKEN       # opcjonalny Bearer (Workers Pipelines Send)
#
# R2 SQL — `run_analytics_query` (Iceberg w tym samym katalogu co CQRS w `epir-analityc-worker`):
# wrangler secret put R2_SQL_API_TOKEN (Workers R2 SQL Read + Data Catalog + storage read)
#
# run_analytics_query: wyłącznie Workers RPC (`BigQueryBatchS2SRpc`) z czatu (`ctx.props`, scope `bigquery.analytics_query`).

[vars]
R2_SQL_ACCOUNT_ID = "73283c24dc79f92edef30dcdbc98f230"
R2_SQL_WAREHOUSE_BUCKET = "epir-analytics-iceberg-warehouse"
WAREHOUSE_SQL_NAMESPACE = "analytics"
WAREHOUSE_SQL_PIXEL_TABLE = "epir_pixel_events_raw"
WAREHOUSE_SQL_MESSAGES_TABLE = "messages_raw"

[observability]
enabled = true
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
