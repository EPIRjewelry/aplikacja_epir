name = "epir-art-jewellery-worker"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Domyślnie na Free Worker limit subrequestów jest niski; pętla narzędzi + MCP powinna mieć 1 wywołanie na turę po poprawnym scalaniu streamu tool_calls.
# Zwiększenie (np. przy wielu narzędziach w jednej turze): https://developers.cloudflare.com/workers/wrangler/configuration/#limits
# [limits]
# subrequests = 1000

[build]
command = ""

[durable_objects]
bindings = [
  { name = "SESSION_DO", class_name = "SessionDO" },
  { name = "RATE_LIMITER_DO", class_name = "RateLimiterDO" },
  { name = "TOKEN_VAULT_DO", class_name = "TokenVaultDO" }
]

[[d1_databases]]
binding = "DB"
database_name = "jewelry-analytics-db"
database_id = "6a4f7cbb-3c1c-42c7-9d79-4ef74d421f23"

[[d1_databases]]
binding = "DB_CHATBOT"
database_name = "ai-assistant-sessions-db"
database_id = "475a1cb7-f1b5-47ba-94ed-40fd64c32451"

# Queues require paid plan - commented out for now
# [[queues.producers]]
# binding = "INDEX_QUEUE"
# queue = "epir-index-queue"

# ---------------------------------------------------------------------------
# Memory pipeline (Etap 3 — semantyczna pamięć klienta, KB-clamped)
# Włącz dopiero po: (1) stworzeniu kolejek, (2) utworzeniu indeksu Vectorize,
# (3) uruchomieniu migracji 009-011. Flaga `MEMORY_EXTRACT_ENABLED` kontroluje
# producenta w SessionDO, `MEMORY_V2_ENABLED` — assembler promptu.
#
# Provisioning (na planie płatnym):
#   wrangler queues create memory-extract
#   wrangler queues create memory-extract-dlq
#   wrangler vectorize create memory_customer --dimensions=384 --metric=cosine
# ---------------------------------------------------------------------------
# Po pełnym provisioning można odkomentować poniższe bindingi albo przenieść je
# do sekcji środowiskowej (np. [env.production]).
# [[queues.producers]]
# binding = "MEMORY_EXTRACT_QUEUE"
# queue = "memory-extract"
#
# [[queues.consumers]]
# queue = "memory-extract"
# max_batch_size = 10
# max_batch_timeout = 5
# max_retries = 5
# dead_letter_queue = "memory-extract-dlq"
#
# [[vectorize]]
# binding = "MEMORY_INDEX"
# index_name = "memory_customer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TokenVaultDO"]

# AI binding
[ai]
binding = "AI"

# Inference: `src/ai-client.ts` → Workers AI `env.AI` (`@cf/moonshotai/kimi-k2.5`).

# Headless / BFF S2S ingress secret (must be set via secret, never in [vars]):
# wrangler secret put EPIR_CHAT_SHARED_SECRET
# Shopify Admin API enrichment dla zalogowanego klienta (imię / email / profil):
# wrangler secret put SHOPIFY_ADMIN_TOKEN

# Service binding to RAG worker (reusable RAG orchestrator)
[[services]]
binding = "RAG_WORKER"
service = "epir-rag-worker"

# Gateway pattern: Service binding to analytics-worker (zamiast zewnętrznego fetch)
[[services]]
binding = "ANALYTICS_WORKER"
service = "epir-analityc-worker"

# Analytics query (run_analytics_query) – internal only, wymaga ADMIN_KEY
[[services]]
binding = "BIGQUERY_BATCH"
service = "epir-bigquery-batch"

# Routes - subdomena dla Workera
[[routes]]
pattern = "asystent.epirbizuteria.pl/*"
zone_name = "epirbizuteria.pl"

[observability]
enabled = true
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
# Log filter: Only logs from THIS worker (epir-art-jewellery-worker)
# Cloudflare automatically prefixes logs with worker name in dashboard
# Use filter in dashboard: ScriptName == "epir-art-jewellery-worker"

[vars]
ALLOWED_ORIGIN = "https://epir-art-silver-jewellery.myshopify.com"
# Memory v2 feature flags (kontrolują rollout; domyślnie wyłączone, włączamy stopniowo):
# MEMORY_EXTRACT_ENABLED = "true" — producer enqueue w streamAssistant + consumer aktywny.
# MEMORY_V2_ENABLED = "true" — assembler promptu używa deterministic summary + retrieval.
# MEMORY_RAW_RETRIEVAL_ENABLED = "true" — włącza dodatkowe top-k po user-turns.
MEMORY_EXTRACT_ENABLED = "false"
MEMORY_V2_ENABLED = "false"
MEMORY_RAW_RETRIEVAL_ENABLED = "false"
# `null` = literal Origin string from Shopify Web Pixel sandbox (opaque origin), not a TOML null
ALLOWED_ORIGINS = "https://epirbizuteria.pl,https://epir-art-silver-jewellery.myshopify.com,https://asystent.epirbizuteria.pl,https://kazka.epirbizuteria.pl,https://zareczyny.epirbizuteria.pl,null"
SHOP_DOMAIN = "epir-art-silver-jewellery.myshopify.com"
# MCP endpoint - zmienna konfiguracyjna (CHAT_SPEC: shopify-admin-mcp = {shop_domain}/api/mcp)
MCP_ENDPOINT = "https://epir-art-silver-jewellery.myshopify.com/api/mcp"
# WORKER_ORIGIN: URL Workera dla internal MCP calls (używane w rag.ts callMcpTool)
# W produkcji: https://asystent.epirbizuteria.pl
# W dev: https://asystent-epir.YOUR-NAME.workers.dev
WORKER_ORIGIN = "https://asystent.epirbizuteria.pl"
# --- Sekrety Storefront (ustaw ręcznie: wrangler secret put <NAZWA>; NIE commituj wartości) ---
# Fallback dla kanału online-store / aliasów `epir` i `epirbizuteria.pl` (App Proxy, TAE data-brand=epir):
#   wrangler secret put SHOPIFY_STOREFRONT_TOKEN
# Zareczyny (Hydrogen + odczyt ai_profile — public + private zgodnie z workers/chat resolveStorefrontConfig):
#   wrangler secret put PUBLIC_STOREFRONT_API_TOKEN_ZARECZYNY
#   wrangler secret put PRIVATE_STOREFRONT_API_TOKEN_ZARECZYNY
# Kazka:
#   wrangler secret put PUBLIC_STOREFRONT_API_TOKEN_KAZKA
# Opcjonalny fallback prywatnego tokenu (gdy brak per-zareczyny):
#   wrangler secret put PRIVATE_STOREFRONT_API_TOKEN
# Chat worker używa wyłącznie Workers AI `@cf/moonshotai/kimi-k2.5`.
#
# Weryfikacja profilu AI (log: "AI profile unavailable"):
# - W Cloudflare: ustawione powyższe sekrety dla danego kanału (fallback: SHOPIFY_STOREFRONT_TOKEN).
# - W Shopify Admin: metaobject typu ai_profile — wpis dla handle (np. zareczyny) opublikowany (Storefront), pola brand_voice itd. niepuste.
# - W logach: [ai-profile] unavailable (pre-flight) = brak GID/tokenu/domeny; Metaobject not found = zły GID lub brak publikacji.
