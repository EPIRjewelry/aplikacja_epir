name = "epir-marketing-ingest"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
# Włącza publiczny URL *.workers.dev — potrzebny do GET /ops/marketing-preview bez własnej trasy DNS (Bearer i tak chroni dane).
workers_dev = true

[build]
command = ""

[env.staging]

[env.production]
workers_dev = false

# Co 6 h UTC — zgodnie z planem (quota Google); zmień na rzadsze jeśli potrzeba.
[triggers]
crons = ["0 */6 * * *"]

# Ten sam bucket Iceberg co analytics / bigquery-batch; tabele marketingowe w namespace `marketing`
# (ustalane w Pipeline SQL → R2 Data Catalog). Nie duplikujemy `analytics.epir_pixel_events_raw`.
[vars]
MARKETING_ICEBERG_BUCKET = "epir-analytics-iceberg-warehouse"
MARKETING_SQL_NAMESPACE = "marketing"
# Numeryczne Property ID z GA4 Admin (nie Measurement ID / prefiks analytics_*).
GA4_PROPERTY_ID = "435783047"

# Połączenia GA4 + Google Ads — krok po kroku: README.md w tym katalogu.
#
# Sekrety (z katalogu workers/marketing-ingest). Przy wielu [env.*] dopasuj --env do deployu.
# npx wrangler secret put MARKETING_PIPELINE_INGEST_URL --env=""
# npx wrangler secret put MARKETING_PIPELINE_INGEST_TOKEN --env=""
# npx wrangler secret put GA4_SERVICE_ACCOUNT_JSON --env=""
# npx wrangler secret put GOOGLE_ADS_CLIENT_SECRET --env=""
# npx wrangler secret put GOOGLE_ADS_REFRESH_TOKEN --env=""
# npx wrangler secret put GOOGLE_ADS_DEVELOPER_TOKEN --env=""
# Opcjonalnie MCC: npx wrangler secret put GOOGLE_ADS_LOGIN_CUSTOMER_ID --env=""  # CID menedżera, bez myślników
# Ops (odczyt GA4+Ads w JSON, bez ingestu Pipelines): ustaw sekret, przypisz trasę HTTP do workera, potem:
#   GET /ops/marketing-preview  z nagłówkiem  Authorization: Bearer <MARKETING_OPS_PREVIEW_KEY>
#   opcjonalnie ?date=YYYY-MM-DD (domyślnie wczoraj UTC). Bez sekretu MARKETING_OPS_PREVIEW_KEY → 404.
# Stanowy podgląd (Durable Object, ten sam Bearer co preview):
#   POST /ops/marketing-analyst/{instance}/refresh  — body opcjonalnie {"date":"YYYY-MM-DD"}; zwraca preview + zapisuje skrót w DO.
#   GET  /ops/marketing-analyst/{instance}/state   — ostatni zapisany skrót (liczniki wierszy + data).
# npx wrangler secret put MARKETING_OPS_PREVIEW_KEY --env=""
# Ads: GOOGLE_ADS_CLIENT_ID, GOOGLE_ADS_CUSTOMER_ID — [vars] lub Dashboard (nie-sekret).
#
# Nie używaj (Worker ich nie czyta — usuń z CF jeśli istnieją):
# PIPELINE_GA4_INGEST_URL, PIPELINE_ADS_INGEST_URL, GA4_CLIENT_EMAIL, GA4_PRIVATE_KEY
# R2_SQL_API_TOKEN na tym workerze nie jest używany przez kod marketing-ingest.

[durable_objects]
bindings = [
  { name = "MarketingAnalystAgent", class_name = "MarketingAnalystAgent" }
]

[[migrations]]
tag = "v1_marketing_analyst_agent"
new_classes = ["MarketingAnalystAgent"]

[observability]
enabled = true
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
